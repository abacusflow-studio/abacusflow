name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to deploy"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: read

jobs:
  deploy-prod:
    name: Deploy abacusflow server to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Set release version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "release_version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_version=${{ github.event.inputs.release_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy server to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            export ABACUSFLOW_SERVER_VERSION="${{ steps.vars.outputs.release_version }}"

            cd /opt/abacusflow/abacusflow/

            echo "Deploying server version ${{ steps.vars.outputs.release_version }} to production..."
            docker compose -f docker-compose-prod.yml pull abacusflow-server
            docker compose -f docker-compose-prod.yml up -d --no-deps abacusflow-server

            echo "Server deployment completed successfully."
