name: Pull Request CI

on:
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  backend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/infra-ci:latest
      options: --user root
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backend build
        run: |
          chmod +x ./gradlew
          ./gradlew clean :abacusflow-server:build -PnoVersion --no-daemon

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: abacusflow-apps/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: abacusflow-apps

      - name: Lint web app
        run: npm run lint -w abacusflow-web
        working-directory: abacusflow-apps

      - name: Build web app
        run: npm run build -w abacusflow-web
        working-directory: abacusflow-apps

  mobile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: abacusflow-apps/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: abacusflow-apps

      - name: Lint mobile app
        run: npm run lint -w abacusflow-mobile
        working-directory: abacusflow-apps

      - name: Typecheck mobile app
        run: npm run typecheck -w abacusflow-mobile
        working-directory: abacusflow-apps
