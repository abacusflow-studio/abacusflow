spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:abacusflow}
    username: ${POSTGRES_USER:abacusflow}
    password: ${POSTGRES_PASSWORD:123ABCdef*}
    hikari:
      transaction-isolation: TRANSACTION_REPEATABLE_READ
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    file: UTF-8
    console: UTF-8
  file:
    name: logs/app.log

abacusflow:
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      bucket: ${S3_BUCKET:abacusflow}
      access-key-id: ${S3_ACCESS_KEY:minioadmin}
      secret-access-key: ${S3_SECRET_KEY:minioadmin}
      region: ${S3_REGION:us-east-1}